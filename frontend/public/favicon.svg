<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="a" x1="9" y1="9" x2="23" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="48%"  stop-color="#e0faff"/>
      <stop offset="52%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="b" x1="23" y1="9" x2="9" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="48%"  stop-color="#e0faff"/>
      <stop offset="52%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"  stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Scope ring -->
  <circle cx="16" cy="16" r="12.5"
    stroke="#22d3ee" stroke-width="0.6" stroke-opacity="0.22"
    stroke-dasharray="3 4" fill="none"/>

  <!-- X arm \ -->
  <line x1="9" y1="9" x2="23" y2="23"
    stroke="url(#a)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- X arm / -->
  <line x1="23" y1="9" x2="9" y2="23"
    stroke="url(#b)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Glow halo -->
  <circle cx="16" cy="16" r="4.5" fill="url(#g)"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.3" fill="white" fill-opacity="0.93"/>
</svg>
